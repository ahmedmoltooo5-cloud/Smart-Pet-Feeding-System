services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smart-pet-feeder-sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-YourStrong!Passw0rd}"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
